# ============================================================
# EstimateOS — AWS Production Docker Compose
# Frontend : https://valuscop.com
# API      : https://api.valuscop.com
#
# IMPORTANT: All infrastructure passwords are hardcoded here.
# Application secrets come from backend/.env.production
#
# USAGE:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f api
#   docker compose -f docker-compose.prod.yml ps
# ============================================================

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: estimateos-postgres
    restart: always
    environment:
      POSTGRES_DB:       estimateos
      POSTGRES_USER:     estimateos
      POSTGRES_PASSWORD: "CHANGE_DB_PASSWORD"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estimateos -d estimateos"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks: [estimateos-net]

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: estimateos-redis
    restart: always
    command:
      - redis-server
      - --requirepass
      - "CHANGE_REDIS_PASSWORD"
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "60"
      - "1"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "CHANGE_REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 15s
    networks: [estimateos-net]

  # ── Qdrant ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: estimateos-qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    networks: [estimateos-net]

  # ── MinIO ─────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: estimateos-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     "CHANGE_MINIO_KEY"
      MINIO_ROOT_PASSWORD: "CHANGE_MINIO_SECRET"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s
    networks: [estimateos-net]

  # ── MinIO Bucket Init ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: estimateos-minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 CHANGE_MINIO_KEY CHANGE_MINIO_SECRET
        mc mb --ignore-existing local/platform-system
        mc mb --ignore-existing local/quotations
        echo "MinIO buckets ready"
        exit 0
    networks: [estimateos-net]

  # ── Backend API ───────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estimateos-api
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      # Override with Docker service hostnames
      DB_HOST:        postgres
      DB_PASSWORD:    "CHANGE_DB_PASSWORD"
      DB_USERNAME:    estimateos
      DB_NAME:        estimateos
      REDIS_HOST:     redis
      REDIS_PASSWORD: "CHANGE_REDIS_PASSWORD"
      QDRANT_HOST:    qdrant
      MINIO_ENDPOINT: minio
      MINIO_ACCESS_KEY: "CHANGE_MINIO_KEY"
      MINIO_SECRET_KEY: "CHANGE_MINIO_SECRET"
      NODE_ENV:       production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s
    networks: [estimateos-net]

  # ── AI Worker ─────────────────────────────────────────────────
  ai-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: estimateos-ai-worker
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST:          postgres
      DB_PASSWORD:      "CHANGE_DB_PASSWORD"
      DB_USERNAME:      estimateos
      DB_NAME:          estimateos
      REDIS_HOST:       redis
      REDIS_PASSWORD:   "CHANGE_REDIS_PASSWORD"
      QDRANT_HOST:      qdrant
      MINIO_ENDPOINT:   minio
      MINIO_ACCESS_KEY: "CHANGE_MINIO_KEY"
      MINIO_SECRET_KEY: "CHANGE_MINIO_SECRET"
      NODE_ENV:         production
      WORKER_MODE:      "true"
      WORKER_CONCURRENCY: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [estimateos-net]

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.valuscop.com/api/v1
    container_name: estimateos-frontend
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks: [estimateos-net]

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: estimateos-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks: [estimateos-net]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  estimateos-net:
    driver: bridge
