# ============================================================
# EstimateOS — PRODUCTION Docker Compose
# Domain: valuscop.com
# ============================================================
# USAGE:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f api
#   docker compose -f docker-compose.prod.yml down

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: estimateos-postgres
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks: [estimateos-net]
    # No ports exposed to host in production (only internal)

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: estimateos-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks: [estimateos-net]

  # ── Qdrant ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: estimateos-qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__TELEMETRY_DISABLED: "true"
    networks: [estimateos-net]

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: estimateos-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s
    networks: [estimateos-net]

  # ── MinIO bucket init ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: estimateos-minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/platform-system;
        mc mb --ignore-existing local/quotations;
        echo 'Buckets ready';
        exit 0;
      "
    networks: [estimateos-net]

  # ── Backend API ───────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estimateos-api
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST:        postgres
      REDIS_HOST:     redis
      QDRANT_HOST:    qdrant
      MINIO_ENDPOINT: minio
      NODE_ENV:       production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s
    networks: [estimateos-net]

  # ── AI Worker ─────────────────────────────────────────────────
  ai-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: estimateos-ai-worker
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST:            postgres
      REDIS_HOST:         redis
      QDRANT_HOST:        qdrant
      MINIO_ENDPOINT:     minio
      NODE_ENV:           production
      WORKER_MODE:        "true"
      WORKER_CONCURRENCY: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [estimateos-net]

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # In production the browser calls the PUBLIC domain
        NEXT_PUBLIC_API_URL: https://api.valuscop.com/api/v1
        
    container_name: estimateos-frontend
    restart: always
    depends_on:
      api:
        condition: service_healthy
    networks: [estimateos-net]

  # ── Nginx (HTTP + HTTPS) ──────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: estimateos-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates from Let's Encrypt (mounted from host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks: [estimateos-net]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  estimateos-net:
    driver: bridge
