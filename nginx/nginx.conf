# ============================================================
# EstimateOS — Production Nginx Config
# Domain: valuscop.com + www.valuscop.com
# SSL via Let's Encrypt (Certbot)
# ============================================================

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Upstream services ────────────────────────────────────────
  upstream api {
    server api:3000;
    keepalive 32;
  }

  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  # ── Rate limiting ────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=30r/s;
  limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=3r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=10r/m;

  # ── Performance ──────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # ── Gzip ─────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml image/svg+xml font/woff2;
  gzip_min_length 1024;

  # ── Logging ───────────────────────────────────────────────────
  log_format main '$remote_addr - [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── HTTP → HTTPS redirect ────────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name valuscop.com www.valuscop.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
      return 301 https://valuscop.com$request_uri;
    }
  }

  # ── Redirect www → non-www ───────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.valuscop.com;

    ssl_certificate     /etc/letsencrypt/live/valuscop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/valuscop.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://valuscop.com$request_uri;
  }

  # ── Main HTTPS server ─────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name valuscop.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/valuscop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/valuscop.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # SSL hardening
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;

    # File size limits
    client_max_body_size 150M;
    client_body_timeout  300s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # ── Auth — strict rate limit ─────────────────────────────
    location /api/v1/auth/login {
      limit_req zone=auth_limit burst=5 nodelay;
      proxy_pass         http://api;
      include            /etc/nginx/proxy_params;
    }

    # ── File upload ──────────────────────────────────────────
    location /api/v1/files/upload {
      limit_req              zone=upload_limit burst=3 nodelay;
      client_max_body_size   150M;
      proxy_pass             http://api;
      proxy_read_timeout     600s;
      proxy_send_timeout     600s;
      proxy_request_buffering off;
      include                /etc/nginx/proxy_params;
    }

    # ── All API routes ───────────────────────────────────────
    location /api/ {
      limit_req          zone=api_limit burst=20 nodelay;
      proxy_pass         http://api;
      proxy_read_timeout 300s;
      include            /etc/nginx/proxy_params;
    }

    # ── Frontend ─────────────────────────────────────────────
    location / {
      proxy_pass http://frontend;
      include    /etc/nginx/proxy_params;
    }

    # ── Health check ─────────────────────────────────────────
    location /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
