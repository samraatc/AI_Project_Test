# ============================================================
# EstimateOS Nginx — HTTP only (use during SSL setup phase)
# After SSL is obtained, nginx uses nginx.conf (HTTPS)
# ============================================================
events {
  worker_connections 1024;
}

http {
  upstream api      { server api:3000; keepalive 32; }
  upstream frontend { server frontend:3000; keepalive 16; }

  server {
    listen 80;
    listen [::]:80;
    server_name valuscop.com www.valuscop.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Proxy to app (temporary, until SSL is ready)
    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
